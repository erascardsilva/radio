name: Release Cross-Platform

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: build/bin/radiogo-amd64-installer.exe
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: build/radiogo-linux-amd64.deb

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows App & Installer
        if: runner.os == 'Windows'
        run: |
          wails build -nsis -platform ${{ matrix.platform }}

      - name: Build Linux App
        if: runner.os == 'Linux'
        run: |
          wails build -platform ${{ matrix.platform }}

      - name: Package DEB (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p build/deb/DEBIAN
          mkdir -p build/deb/usr/bin
          mkdir -p build/deb/usr/share/applications
          mkdir -p build/deb/usr/share/icons/hicolor/256x256/apps
          
          cp build/bin/radiogo build/deb/usr/bin/
          cp snap/gui/radiogo.desktop build/deb/usr/share/applications/
          cp snap/gui/radiogo.png build/deb/usr/share/icons/hicolor/256x256/apps/
          
          # Extract version from tag (e.g., v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          
          cat <<EOF > build/deb/DEBIAN/control
          Package: radiogo
          Version: $VERSION
          Section: multimedia
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.0-37
          Maintainer: Erasmo Cardoso <erasmo@vmi-informatica.com.br>
          Description: Um Media Center Híbrido. Rádios Globais, YouTube Streams e Músicas Locais.
          EOF
          
          dpkg-deb --build build/deb
          mv build/deb.deb build/radiogo-linux-amd64.deb

      - name: Release Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
