name: radiogo
base: core22
version: '1.0.0'
summary: Um Media Center Híbrido. Rádios Globais, YouTube Streams e Músicas Locais.
description: |
  O radio_GO é um player de mídia moderno. Escute centenas de estações 
  de rádio pelo mundo, transmita diretamente o áudio do YouTube via URL sem carregar vídeos, 
  e escute toda sua biblioteca de Músicas MP3 diretamente do seu computador 
  com um visual elegante e controle nativo de reprodução.
grade: stable
confinement: strict
icon: snap/gui/radiogo.png
title: RadioGO

apps:
  radiogo:
    command: bin/radiogo
    extensions: [gnome]
    environment:
      WEBKIT_DISABLE_SANDBOX: "1"
      GTK_MODULES: ""
      DISABLE_WAYLAND: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
    plugs:
      - network
      - network-bind
      - audio-playback
      - home
      - opengl
      - hardware-observe

parts:
  radiogo:
    plugin: nil
    source: .
    build-snaps:
      - go/1.23/stable
      - node/20/stable
    build-packages:
      - libgtk-3-dev
      - libwebkit2gtk-4.0-dev
    override-build: |
      go install github.com/wailsapp/wails/v2/cmd/wails@latest
      export PATH=$PATH:$(go env GOPATH)/bin
      
      wails build
      
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp build/bin/radiogo $SNAPCRAFT_PART_INSTALL/bin/
      
      mkdir -p $SNAPCRAFT_PART_INSTALL/gui
      cp snap/gui/*.png $SNAPCRAFT_PART_INSTALL/gui/
      cp snap/gui/*.desktop $SNAPCRAFT_PART_INSTALL/gui/
