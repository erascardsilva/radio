name: radiogo
base: core24
version: '1.0.0'
summary: Um Media Center Híbrido. Rádios Globais, YouTube Streams e Músicas Locais.
description: |
  O radio_GO é um player de mídia moderno. Escute centenas de estações 
  de rádio pelo mundo, transmita diretamente o áudio do YouTube via URL sem carregar vídeos, 
  e escute toda sua biblioteca de Músicas MP3 diretamente do seu computador 
  com um visual elegante e controle nativo de reprodução.
grade: stable
confinement: strict
icon: snap/gui/radiogo.png
title: RadioGO

platforms:
  amd64:

apps:
  radiogo:
    command: bin/radiogo
    extensions: [gnome]
    environment:
      LIBGL_ALWAYS_SOFTWARE: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
      WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: "1"
      ALSA_CONFIG_PATH: $SNAP/etc/asound.conf
    plugs:
      - home
      - network
      - opengl
      - wayland
      - x11
      - desktop
      - desktop-legacy
      - audio-playback
      - network-bind

parts:
  asound-conf:
    plugin: dump
    source: snap/local
    organize:
      asound.conf: etc/asound.conf

  radiogo:
    after: [asound-conf]
    plugin: nil
    source: .
    build-snaps:
      - go/1.23/stable
      - node/20/stable
    build-packages:
      - build-essential
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
    stage-packages:
      - libgstreamer1.0-0
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-gl
      - gstreamer1.0-pulseaudio
      - libgstreamer-plugins-base1.0-0
      - libgstreamer-gl1.0-0
      - libasound2-plugins
      - libpulse0
    override-build: |
      go install github.com/wailsapp/wails/v2/cmd/wails@latest
      export PATH=$PATH:$(go env GOPATH)/bin
      
      wails build -m -tags webkit2_41 -nsis=false -upx=false -trimpath -o radiogo
      
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp build/bin/radiogo $CRAFT_PART_INSTALL/bin/
      
      mkdir -p $CRAFT_PART_INSTALL/gui
      cp snap/gui/*.png $CRAFT_PART_INSTALL/gui/
      cp snap/gui/*.desktop $CRAFT_PART_INSTALL/gui/
